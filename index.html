<!DOCTYPE html>
<html>
<head>
<title>Coral Stress Analyzer</title>

<style>

body{
font-family:Arial;
background:#0b1d2a;
color:white;
text-align:center;
padding:40px;
}

.container{
background:#132f45;
padding:30px;
border-radius:15px;
width:500px;
margin:auto;
}

button{
padding:10px;
font-size:16px;
margin-top:10px;
}

img{
max-width:100%;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Coral Stress Analyzer</h1>

<p>Upload an image of a coral to analyze its health.</p>

<input type="file" id="upload">

<br>

<button onclick="analyze()">Analyze Coral</button>

<br>

<img id="preview">

<h2 id="result"></h2>

</div>

<script>

let imageData;

document.getElementById("upload").addEventListener("change", function(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(event){
document.getElementById("preview").src = event.target.result;
imageData = event.target.result;
}

reader.readAsDataURL(file);

});

function analyze(){

let img = document.getElementById("preview");

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

let data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

let total = 0;

for(let i=0;i<data.length;i+=4){

let r = data[i];
let g = data[i+1];
let b = data[i+2];

let brightness = (r+g+b)/3;

total += brightness;

}

let avg = total/(data.length/4);

if(avg > 200){
document.getElementById("result").innerHTML="🔴 Bleached Coral Detected";
}

else if(avg > 140){
document.getElementById("result").innerHTML="🟡 Possible Coral Stress";
}

else{
document.getElementById("result").innerHTML="🟢 Healthy Coral";
}

}

</script>

</body>

</html>
